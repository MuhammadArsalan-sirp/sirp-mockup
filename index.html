<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/sirp-cube.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIRP v3</title>
    <script>
      // Anti-flicker: apply persisted theme mode before paint
      (function () {
        try {
          var raw = localStorage.getItem("sirp-prefs");
          var mode = raw ? JSON.parse(raw)?.state?.themeMode : "dark";
          var isDark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
